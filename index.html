<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LED Display Pengumuman</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Hitam pekat agar kontras di LED */
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Input - Bisa disembunyikan */
        #admin-panel {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: opacity 0.3s;
        }
        .hidden { opacity: 0; pointer-events: none; }

        /* Tampilan Utama LED */
        .led-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .announcement-window {
            width: 100%;
            height: 120px; /* Tinggi satu baris pengumuman */
            overflow: hidden;
            position: relative;
            background: #1a1a1a;
            border-top: 4px solid #ffcc00;
            border-bottom: 4px solid #ffcc00;
        }

        .announcement-list {
            position: absolute;
            width: 100%;
            margin: 0;
            padding: 0;
            list-style: none;
            transition: top 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .announcement-list li {
            height: 120px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            color: #fff;
            font-size: 3rem; /* Font besar untuk LED */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .date-badge {
            background: #ff4757;
            padding: 5px 20px;
            border-radius: 10px;
            font-size: 1.5rem;
            margin-right: 30px;
            color: white;
            white-space: nowrap;
        }

        .instruction {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #444;
            font-size: 12px;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h3 style="margin-top:0">Control Panel</h3>
        <input type="text" id="judul" placeholder="Isi Pengumuman..." style="padding:8px; width:200px">
        <input type="date" id="tanggal" style="padding:8px">
        <button onclick="tambahPengumuman()" style="padding:8px 15px; background:#27ae60; color:white; border:none; cursor:pointer">Tambah</button>
        <button onclick="hapusSemua()" style="padding:8px 15px; background:#c0392b; color:white; border:none; cursor:pointer">Hapus Semua</button>
        <p style="font-size: 11px; color: #666;">Tekan <b>"H"</b> untuk sembunyi/munculkan panel ini.</p>
    </div>

    <div class="led-container">
        <div class="announcement-window">
            <ul id="list-wrapper" class="announcement-list" style="top: 0;">
                </ul>
        </div>
    </div>

    <div class="instruction">Tekan 'H' untuk Menu</div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let currentPos = 0;
        let dataPengumuman = JSON.parse(localStorage.getItem('myAnnouncements')) || [];

        // Fungsi Render Data
        function renderData() {
            listWrapper.innerHTML = '';
            if (dataPengumuman.length === 0) {
                listWrapper.innerHTML = `<li><span class="date-badge">INFO</span> Standby - Masukkan Pengumuman...</li>`;
                return;
            }
            dataPengumuman.forEach(item => {
                let li = document.createElement('li');
                li.innerHTML = `<span class="date-badge">${item.tgl}</span> ${item.teks}`;
                listWrapper.appendChild(li);
            });
        }

        function tambahPengumuman() {
            let judul = document.getElementById('judul').value;
            let tanggal = document.getElementById('tanggal').value;

            if (!judul || !tanggal) return alert("Isi semua data!");

            let d = new Date(tanggal);
            let dateString = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });

            dataPengumuman.push({ teks: judul, tgl: dateString });
            localStorage.setItem('myAnnouncements', JSON.stringify(dataPengumuman));
            
            document.getElementById('judul').value = '';
            renderData();
        }

        function hapusSemua() {
            if(confirm("Hapus semua data?")) {
                dataPengumuman = [];
                localStorage.removeItem('myAnnouncements');
                renderData();
            }
        }

        // Toggle Panel Admin dengan Tombol 'H'
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                document.getElementById('admin-panel').classList.toggle('hidden');
            }
        });

        // Auto Scroll Logic
        setInterval(() => {
            let items = listWrapper.getElementsByTagName('li');
            if (items.length > 1) {
                currentPos -= 120;
                if (Math.abs(currentPos) >= items.length * 120) {
                    currentPos = 0;
                }
                listWrapper.style.top = currentPos + "px";
            }
        }, 4000); // Ganti setiap 4 detik

        // Load awal
        renderData();
    </script>
</body>
</html>
