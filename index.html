<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Pengumuman Input</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background-color: #f4f7f6;
        }

        /* Area Form Input */
        .input-section {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            max-width: 600px;
        }

        input, button {
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #219150; }

        /* Tampilan Pengumuman */
        .announcement-box {
            width: 100%;
            max-width: 600px;
            height: 60px;
            background: #2c3e50;
            color: white;
            overflow: hidden;
            border-radius: 10px;
            position: relative;
        }

        .announcement-list {
            position: absolute;
            width: 100%;
            margin: 0;
            padding: 0;
            list-style: none;
            transition: all 0.5s ease-in-out;
        }

        .announcement-list li {
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .date-badge {
            background: #e67e22;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 15px;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="input-section">
        <h3>➕ Tambah Pengumuman Baru</h3>
        <input type="text" id="judul" placeholder="Isi Pengumuman..." style="width: 60%;">
        <input type="date" id="tanggal">
        <button onclick="tambahPengumuman()">Tambah</button>
    </div>

    <div class="announcement-box">
        <ul id="list-wrapper" class="announcement-list" style="top: 0;">
            <li><span class="date-badge">11 Mei 2026</span> Selamat Datang di Sistem Pengumuman!</li>
        </ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let currentPos = 0;

        function tambahPengumuman() {
            let judul = document.getElementById('judul').value;
            let tanggal = document.getElementById('tanggal').value;

            if (judul === "" || tanggal === "") {
                alert("Harap isi judul dan tanggal!");
                return;
            }

            // Format tanggal agar lebih manis
            let d = new Date(tanggal);
            let dateString = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });

            // Tambahkan elemen baru ke list
            let li = document.createElement('li');
            li.innerHTML = `<span class="date-badge">${dateString}</span> ${judul}`;
            listWrapper.appendChild(li);

            // Reset input
            document.getElementById('judul').value = "";
        }

        // Fungsi Auto-Scroll Berbasis JavaScript
        setInterval(() => {
            let items = listWrapper.getElementsByTagName('li');
            if (items.length > 1) {
                currentPos -= 60; // Geser ke atas sesuai tinggi li
                
                // Jika sudah sampai akhir, balik ke awal
                if (Math.abs(currentPos) >= items.length * 60) {
                    currentPos = 0;
                }
                
                listWrapper.style.top = currentPos + "px";
            }
        }, 3000); // Ganti pengumuman setiap 3 detik
    </script>

</body>
</html>
