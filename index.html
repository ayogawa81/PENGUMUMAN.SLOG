<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Jadwal Kegiatan Online Synchronized</title>
    <style>
        /* CSS ANDA TETAP SAMA */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { background: linear-gradient(90deg, #1e3a8a, #0f172a); padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3b82f6; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3); }
        .logo-title h1 { font-size: 2.2rem; font-weight: 800; letter-spacing: 1px; color: #ffffff; text-transform: uppercase; }
        .datetime-container { text-align: right; background: rgba(30, 41, 59, 0.7); padding: 10px 20px; border-radius: 12px; border: 1px solid #334155; display: flex; align-items: center; gap: 20px; }
        #clock { font-size: 2.5rem; font-weight: bold; color: #3b82f6; font-variant-numeric: tabular-nums; }
        .table-container { width: 100%; background-color: #1e293b; padding: 20px; border-radius: 16px; }
        .status-badge { padding: 6px 16px; border-radius: 30px; font-weight: bold; }
        .status-ongoing { color: #3b82f6; border: 1px solid #3b82f6; }
        .status-waiting { color: #f59e0b; border: 1px solid #f59e0b; }
        .status-done { color: #10b981; border: 1px solid #10b981; }
        #tizenAudioUnlocker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>

<div id="tizenAudioUnlocker">
    <h1>SISTEM MONITORING JADWAL</h1>
    <p>Klik tombol di bawah untuk mengaktifkan suara pengumuman.</p>
    <button onclick="bukaKunciAudioTizen()" style="padding: 20px 40px; font-size: 1.5rem; cursor: pointer; background: #10b981; border: none; color: white; border-radius: 10px;">🔊 AKTIFKAN SUARA</button>
</div>

<header>
    <div class="logo-title"><h1>JADWAL KEGIATAN UTAMA</h1></div>
    <div class="datetime-container"><div id="clock">00:00:00</div></div>
</header>

<main>
    <div class="table-container">
        <table>
            <thead><tr><th>Waktu</th><th>Kegiatan</th><th>Personel</th><th>Lokasi</th><th>Status</th></tr></thead>
            <tbody id="main-table-body"></tbody>
        </table>
    </div>
</main>

<script>
    const dbURL = "https://api.npoint.io/79fb87bf4e7964927964";
    let tizenAudioValid = false;
    let systemSchedules = [], spokenSchedules = new Set();

    // FUNGSI AKTIVASI AUDIO (SINGLE SOURCE OF TRUTH)
    function bukaKunciAudioTizen() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        audioCtx.resume().then(() => {
            tizenAudioValid = true;
            document.getElementById('tizenAudioUnlocker').style.display = 'none';
            panggilSuaraAI("Sistem pengumuman telah diaktifkan.");
        });
    }

    // FUNGSI PENGUMUMAN (INTEGRASI TTS)
    function panggilSuaraAI(teks) {
        if (!tizenAudioValid) return;
        window.speechSynthesis.cancel();
        const speech = new SpeechSynthesisUtterance(teks);
        speech.lang = 'id-ID';
        speech.rate = 0.9;
        
        // Coba cari suara Google/Internal
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(v => v.name.includes("Google") || v.name.includes("Indonesian"));
        if (preferredVoice) speech.voice = preferredVoice;
        
        window.speechSynthesis.speak(speech);
    }

    function playBeepSound(callback) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        osc.connect(audioCtx.destination);
        osc.frequency.value = 880;
        osc.start();
        osc.stop(0.1);
        if (callback) setTimeout(callback, 500);
    }

    // ... [Masukkan sisa logika renderSchedules, loadDataFromCloud, dll DI SINI] ...

    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString();
    }, 1000);

    loadDataFromCloud();
</script>
</body>
</html>
