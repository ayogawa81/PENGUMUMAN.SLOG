<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin */
        #admin-panel {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 550px; max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none; }

        /* Tabel Input */
        .input-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; }
        .input-table td { padding: 10px 5px; font-family: 'Segoe UI', sans-serif; font-weight: bold; color: #333; }
        .input-table input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; font-weight: bold; }

        /* List Kelola di Admin */
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 12px; margin-bottom: 8px;
            border-left: 5px solid #27ae60; border-radius: 4px; 
            font-family: sans-serif; font-size: 14px;
        }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 5px; }

        /* Tampilan Utama LED */
        .display-area { width: 100%; height: 100vh; position: relative; }
        #list-wrapper { position: absolute; width: 100%; margin: 0; padding: 0 50px; list-style: none; top: 100%; }
        
        .announcement-item { padding: 60px 0; border-bottom: 3px solid #222; display: flex; flex-direction: column; gap: 20px; }
        
        /* PEWARNAAN BERBEDA (ZEBRA) */
        /* Pesan Ganjil: Kuning */
        .announcement-item:nth-child(odd) .text-content { color: #ffcc00; } 
        /* Pesan Genap: Cyan/Biru Muda */
        .announcement-item:nth-child(even) .text-content { color: #00eaff; } 

        .date-badge { background: #ff4757; color: white; padding: 8px 30px; font-size: 2.5rem; width: fit-content; border-radius: 10px; }
        .text-content { font-size: 6rem; line-height: 1.1; text-transform: uppercase; text-shadow: 5px 5px 0px #000; word-wrap: break-word; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 20px 0; font-family: sans-serif; color: #2c3e50;">Control Panel LED</h2>
        
        <input type="hidden" id="edit-index" value="-1">
        
        <table class="input-table">
            <tr>
                <td width="150">PENGUMUMAN</td>
                <td width="20">:</td>
                <td><input type="text" id="judul" placeholder="Ketik isi pengumuman..."></td>
            </tr>
            <tr>
                <td>TANGGAL</td>
                <td>:</td>
                <td><input type="date" id="tanggal"></td>
            </tr>
        </table>
        
        <button id="btn-save" onclick="simpanPengumuman()" style="padding:15px; background:#27ae60; color:white; border:none; width:100%; font-weight:bold; font-size:18px; cursor:pointer; border-radius: 8px; transition: 0.3s;">TAMBAH PENGUMUMAN</button>
        
        <div style="margin-top:30px;">
            <strong style="font-family: sans-serif; color: #555;">DAFTAR PESAN AKTIF:</strong>
            <div id="admin-manage-list" style="margin-top:15px;"></div>
        </div>

        <p style="color:#aaa; font-size:12px; margin-top:25px; text-align:center; font-family: sans-serif;">
            Tekan <b>"H"</b> untuk Sembunyi/Munculkan Panel.
        </p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper"></ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let adminManageList = document.getElementById('admin-manage-list');
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let position = window.innerHeight;

        function renderAll() {
            listWrapper.innerHTML = '';
            adminManageList.innerHTML = '';

            dataPengumuman.forEach((item, index) => {
                // Tambah ke Layar LED
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `
                    <div class="date-badge">${item.tglDisplay}</div>
                    <div class="text-content">${item.teks}</div>
                `;
                listWrapper.appendChild(li);

                // Tambah ke Daftar Kelola Admin
                let div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <div style="max-width:300px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">
                        <strong>${index + 1}.</strong> ${item.teks}
                    </div>
                    <div>
                        <button class="btn-edit" onclick="isiFormEdit(${index})">Edit</button>
                        <button class="btn-del" onclick="hapusItem(${index})">Hapus</button>
                    </div>
                `;
                adminManageList.appendChild(div);
            });
            
            if (dataPengumuman.length === 0) {
                listWrapper.innerHTML = `<li class="announcement-item"><div class="text-content">STANDBY - BELUM ADA DATA</div></li>`;
            }
        }
