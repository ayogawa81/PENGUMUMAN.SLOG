<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Display Jadwal Terpadu</title>
<style>
    /* Styling tetap sama agar tampilan tidak berubah */
    body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
    #tizenAudioUnlocker { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; }
    button { padding: 20px 40px; font-size: 1.5rem; background-color: #10b981; color: white; border: none; border-radius: 12px; cursor: pointer; }
</style>
</head>
<body>

<div id="tizenAudioUnlocker">
    <h1>SISTEM MONITORING JADWAL</h1>
    <p>Klik tombol di bawah untuk mengaktifkan suara pengumuman.</p>
    <button onclick="bukaKunciAudioTizen()">AKTIFKAN SUARA</button>
</div>

<script>
let tizenAudioValid = false;

// 1. Fungsi Unlock Audio yang Lebih Robust
function bukaKunciAudioTizen() {
    try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();
        
        // Membuka kunci dengan memutar buffer kosong
        const buffer = audioCtx.createBuffer(1, 1, 22050);
        const source = audioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(audioCtx.destination);
        source.start(0);

        tizenAudioValid = true;
        document.getElementById('tizenAudioUnlocker').style.display = 'none';
        
        // Uji coba suara segera setelah di-unlock
        panggilSuaraAI("Sistem audio telah aktif.");
    } catch (e) {
        alert("Gagal mengaktifkan audio: " + e.message);
    }
}

// 2. Fungsi Panggilan Suara (Prioritas TTS Internal)
function panggilSuaraAI(teks) {
    if (!tizenAudioValid) return;

    // Bersihkan antrean agar tidak menumpuk
    window.speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance();
    msg.text = teks;
    msg.lang = 'id-ID';
    msg.rate = 0.95;
    msg.pitch = 1.0;

    // Mencoba mencari suara bahasa Indonesia yang tersedia di sistem
    const voices = window.speechSynthesis.getVoices();
    const idVoice = voices.find(v => v.lang.includes('id-ID'));
    if (idVoice) msg.voice = idVoice;

    window.speechSynthesis.speak(msg);
}

// --- Tambahkan logika sisanya (updateStatusBadges, dll) di sini ---
// Pastikan pemanggilan di dalam updateStatusBadges menggunakan panggilSuaraAI(teks);

</script>
</body>
</html>
