<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin */
        #admin-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 9999;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .hidden { display: none; }

        /* Container Full Screen */
        .display-area {
            width: 100%;
            height: 100vh;
            position: relative;
            padding: 0 5%;
        }

        /* List Pengumuman yang Bergerak */
        #list-wrapper {
            position: absolute;
            width: 90%;
            margin: 0;
            padding: 0;
            list-style: none;
            top: 100%; /* Mulai dari bawah layar */
        }

        .announcement-item {
            padding: 40px 0;
            border-bottom: 2px solid #333;
            color: #fff;
            display: flex;
            flex-direction: column; /* Tanggal di atas, teks di bawah */
            gap: 10px;
        }

        .date-badge {
            background: #ff4757;
            color: white;
            padding: 5px 20px;
            font-size: 1.8rem;
            width: fit-content;
            border-radius: 5px;
        }

        .text-content {
            font-size: 4.5rem; /* Ukuran teks raksasa */
            line-height: 1.2;
            text-transform: uppercase;
            color: #ffcc00; /* Warna kuning khas LED */
        }

        .instruction {
            position: fixed;
            bottom: 10px;
            right: 10px;
            color: #333;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 10px 0">Input LED</h2>
        <input type="text" id="judul" placeholder="Isi Pengumuman..." style="padding:10px; width:300px; font-size:16px">
        <input type="date" id="tanggal" style="padding:10px; font-size:16px">
        <button onclick="tambahPengumuman()" style="padding:10px 20px; background:#27ae60; color:white; border:none; font-weight:bold; cursor:pointer">TAMBAH</button>
        <button onclick="hapusSemua()" style="padding:10px; background:#c0392b; color:white; border:none; cursor:pointer">RESET</button>
        <p style="color:#666; font-size:12px">Tekan <b>"H"</b> untuk sembunyi/munculkan panel ini.</p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper">
            </ul>
    </div>

    <div class="instruction">Tekan 'H' untuk Menu</div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let position = window.innerHeight;
        let animationId;

        function renderData() {
            listWrapper.innerHTML = '';
            if (dataPengumuman.length === 0) {
                listWrapper.innerHTML = `<li class="announcement-item"><div class="text-content">STANDBY - BELUM ADA PENGUMUMAN</div></li>`;
                return;
            }
            dataPengumuman.forEach(item => {
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `
                    <div class="date-badge">${item.tgl}</div>
                    <div class="text-content">${item.teks}</div>
                `;
                listWrapper.appendChild(li);
            });
            // Reset posisi ke bawah saat ada data baru
            position = window.innerHeight;
        }

        function tambahPengumuman() {
            let judul = document.getElementById('judul').value;
            let tanggal = document.getElementById('tanggal').value;
            if (!judul || !tanggal) return;

            let d = new Date(tanggal);
            let dateString = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });

            dataPengumuman.push({ teks: judul, tgl: dateString });
            localStorage.setItem('ledData', JSON.stringify(dataPengumuman));
            document.getElementById('judul').value = '';
            renderData();
        }

        function hapusSemua() {
            if(confirm("Hapus semua?")) {
                dataPengumuman = [];
                localStorage.removeItem('ledData');
                renderData();
            }
        }

        // Animasi Smooth Scroll Ke Atas
        function animate() {
            position -= 2; // Kecepatan gulung (naikkan angka untuk lebih cepat)
            
            // Jika semua teks sudah lewat ke atas, balik lagi ke bawah
            if (position < -listWrapper.offsetHeight) {
                position = window.innerHeight;
            }
            
            listWrapper.style.top = position + 'px';
            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') {
                document.getElementById('admin-panel').classList.toggle('hidden');
            }
        });

        renderData();
        animate(); // Jalankan animasi
    </script>
</body>
</html>
