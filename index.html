<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display - Paragraf Mode</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin */
        #admin-panel {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 600px; max-height: 95vh; overflow-y: auto;
        }
        .hidden { display: none; }

        /* Tabel & Textarea */
        .input-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; }
        .input-table td { padding: 8px 5px; font-family: sans-serif; font-weight: bold; color: #333; vertical-align: top; }
        
        /* Box Input Besar */
        textarea { 
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; 
            font-size: 16px; font-family: sans-serif; resize: vertical; min-height: 120px;
        }
        input[type="date"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }

        .setting-section {
            background: #f0f2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            font-family: sans-serif; border: 1px solid #ddd;
        }

        .admin-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 10px; margin-bottom: 8px;
            border-left: 5px solid #27ae60; border-radius: 4px; font-family: sans-serif;
        }

        /* Tampilan Utama LED */
        .display-area { width: 100%; height: 100vh; position: relative; }
        #list-wrapper { position: absolute; width: 100%; margin: 0; padding: 0 50px; list-style: none; top: 100%; }
        
        .announcement-item { padding: 60px 0; border-bottom: 3px solid #222; display: flex; flex-direction: column; gap: 20px; }
        
        /* Warna Zebra */
        .announcement-item:nth-child(odd) .text-content { color: #ffcc00; } 
        .announcement-item:nth-child(even) .text-content { color: #00eaff; } 

        .date-badge { background: #ff4757; color: white; padding: 5px 25px; font-size: 2rem; width: fit-content; border-radius: 8px; }
        
        /* Mendukung Baris Baru (white-space: pre-line) */
        .text-content { 
            line-height: 1.2; text-transform: uppercase; 
            text-shadow: 4px 4px 0px #000; word-wrap: break-word; 
            white-space: pre-line; /* KUNCI AGAR PARAGRAF MUNCUL */
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 15px 0; font-family: sans-serif;">Control Panel LED</h2>
        
        <div class="setting-section">
            <label style="font-weight: bold;">Ukuran Huruf: <span id="font-val">5</span>rem</label>
            <input type="range" min="1" max="15" step="0.5" value="5" style="width:100%" id="fontSlider" oninput="updateFontSize(this.value)">
        </div>

        <input type="hidden" id="edit-index" value="-1">
        
        <table class="input-table">
            <tr>
                <td width="130">PENGUMUMAN</td>
                <td width="20">:</td>
                <td><textarea id="judulInput" placeholder="Gunakan Enter untuk baris baru..."></textarea></td>
            </tr>
            <tr>
                <td>TANGGAL</td>
                <td>:</td>
                <td><input type="date" id="tanggalInput"></td>
            </tr>
        </table>
        
        <button id="btn-save" onclick="simpanPengumuman()" style="padding:15px; background:#27ae60; color:white; border:none; width:100%; font-weight:bold; font-size:18px; cursor:pointer; border-radius: 8px;">SIMPAN PENGUMUMAN</button>
        
        <div style="margin-top:25px;">
            <strong style="font-family: sans-serif; font-size: 14px;">DAFTAR PESAN:</strong>
            <div id="admin-manage-list" style="margin-top:10px;"></div>
        </div>
        <p style="color:#aaa; font-size:11px; text-align:center; margin-top:20px;">Tekan <b>"H"</b> untuk Sembunyi/Muncul.</p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper"></ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let adminManageList = document.getElementById('admin-manage-list');
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let savedFontSize = localStorage.getItem('ledFontSize') || "5";
        let position = window.innerHeight;

        function updateFontSize(val) {
            document.getElementById('font-val').innerText = val;
            localStorage.setItem('ledFontSize', val);
            renderAll(); // Re-render untuk terapkan font baru
        }

        function renderAll() {
            listWrapper.innerHTML = '';
            adminManageList.innerHTML = '';
            let currentFS = localStorage.getItem('ledFontSize') || "5";

            dataPengumuman.forEach((item, index) => {
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `
                    <div class="date-badge">${item.tglDisplay}</div>
                    <div class="text-content" style="font-size: ${currentFS}rem">${item.teks}</div>
                `;
                listWrapper.appendChild(li);

                let div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <div style="max-width:320px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><strong>${index+1}.</strong> ${item.teks}</div>
                    <div>
                        <button style="background:#f39c12; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px" onclick="isiFormEdit(${index})">Edit
