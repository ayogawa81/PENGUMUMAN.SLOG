<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display Pro - Font Size Control</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin */
        #admin-panel {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 550px; max-height: 95vh; overflow-y: auto;
        }
        .hidden { display: none; }

        /* Tabel Input */
        .input-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; }
        .input-table td { padding: 8px 5px; font-family: sans-serif; font-weight: bold; color: #333; }
        .input-table input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }

        /* Slider Pengaturan */
        .setting-section {
            background: #f0f2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px;
            font-family: sans-serif; border: 1px solid #ddd;
        }
        .slider { width: 100%; cursor: pointer; margin-top: 10px; }

        /* List Kelola */
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f8f9fa; padding: 10px; margin-bottom: 8px;
            border-left: 5px solid #27ae60; border-radius: 4px; font-family: sans-serif;
        }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; margin-left: 5px; }

        /* Tampilan Utama LED */
        .display-area { width: 100%; height: 100vh; position: relative; }
        #list-wrapper { position: absolute; width: 100%; margin: 0; padding: 0 50px; list-style: none; top: 100%; }
        
        .announcement-item { padding: 40px 0; border-bottom: 3px solid #222; display: flex; flex-direction: column; gap: 15px; }
        
        /* Warna Zebra */
        .announcement-item:nth-child(odd) .text-content { color: #ffcc00; } 
        .announcement-item:nth-child(even) .text-content { color: #00eaff; } 

        .date-badge { background: #ff4757; color: white; padding: 5px 25px; font-size: 2rem; width: fit-content; border-radius: 8px; }
        
        /* Font Size dinamis melalui JS */
        .text-content { 
            font-size: 5rem; /* Nilai default */
            line-height: 1.1; text-transform: uppercase; 
            text-shadow: 4px 4px 0px #000; word-wrap: break-word; 
        }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 15px 0; font-family: sans-serif;">Control Panel LED</h2>
        
        <div class="setting-section">
            <label style="font-weight: bold;">Ukuran Huruf LED: <span id="font-val">5</span>rem</label>
            <input type="range" min="1" max="15" step="0.5" value="5" class="slider" id="fontSlider" oninput="updateFontSize(this.value)">
        </div>

        <input type="hidden" id="edit-index" value="-1">
        
        <table class="input-table">
            <tr>
                <td width="130">PENGUMUMAN</td>
                <td width="20">:</td>
                <td><input type="text" id="judulInput" placeholder="Ketik pesan..."></td>
            </tr>
            <tr>
                <td>TANGGAL</td>
                <td>:</td>
                <td><input type="date" id="tanggalInput"></td>
            </tr>
        </table>
        
        <button id="btn-save" onclick="simpanPengumuman()" style="padding:12px; background:#27ae60; color:white; border:none; width:100%; font-weight:bold; font-size:16px; cursor:pointer; border-radius: 8px;">TAMBAH PENGUMUMAN</button>
        
        <div style="margin-top:25px;">
            <strong style="font-family: sans-serif; font-size: 14px;">DAFTAR PESAN AKTIF:</strong>
            <div id="admin-manage-list" style="margin-top:10px;"></div>
        </div>
        <p style="color:#aaa; font-size:11px; text-align:center; margin-top:20px;">Tekan <b>"H"</b> untuk Sembunyi/Muncul.</p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper"></ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let adminManageList = document.getElementById('admin-manage-list');
        
        // Load data & font size
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let savedFontSize = localStorage.getItem('ledFontSize') || "5";
        let position = window.innerHeight;

        // Terapkan Font Size saat load
        function updateFontSize(val) {
            document.getElementById('font-val').innerText = val;
            // Gunakan CSS Variable atau update langsung semua class
            let texts = document.getElementsByClassName('text-content');
            for(let t of texts) {
                t.style.fontSize = val + 'rem';
            }
            localStorage.setItem('ledFontSize', val);
        }

        function renderAll() {
            listWrapper.innerHTML = '';
            adminManageList.innerHTML = '';
            let currentFS = localStorage.getItem('ledFontSize') || "5";

            dataPengumuman.forEach((item, index) => {
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `
                    <div class="date-badge">${item.tglDisplay}</div>
                    <div class="text-content" style="font-size: ${currentFS}rem">${item.teks}</div>
                `;
                listWrapper.appendChild(li);

                let div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <div style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;"><strong>${index+1}.</strong> ${item.teks}</div>
                    <div>
                        <button class="btn-edit" onclick="isiFormEdit(${index})">✎</button>
                        <button class="btn-del" onclick="hapusItem(${index})">✕</button>
                    </div>
                `;
                adminManageList.appendChild(div);
            });
            
            if (dataPengumuman.length === 0) {
                listWrapper.innerHTML = `<li class="announcement-item"><div class="text-content">STANDBY - BELUM ADA DATA</div></li>`;
            }
        }

        function simpanPengumuman() {
            let judul = document.getElementById('judulInput').value;
            let tanggal = document.getElementById('tanggalInput').value;
            let editIndex = document.getElementById('edit-index').value;

            if (!judul || !tanggal) return alert("Isi data!");

            let d = new Date(tanggal);
            let tglDisplay = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });

            if (editIndex === "-1") {
                dataPengumuman.push({ teks: judul, tglRaw: tanggal, tglDisplay: tglDisplay });
            } else {
                dataPengumuman[parseInt(editIndex)] = { teks: judul, tglRaw: tanggal, tglDisplay: tglDisplay };
                document.getElementById('edit-index').value = "-1";
                document.getElementById('btn-save').innerText = "TAMBAH PENGUMUMAN";
                document.getElementById('btn-save').style.background = "#27ae60";
            }

            localStorage.setItem('ledData', JSON.stringify(dataPengumuman));
            document.getElementById('judulInput').value = '';
            document.getElementById('tanggalInput').value = '';
            renderAll();
        }

        function isiFormEdit(index) {
            let item = dataPengumuman[index];
            document.getElementById('judulInput').value = item.teks;
            document.getElementById('tanggalInput').value = item.tglRaw;
            document.getElementById('edit-index').value = index;
            document.getElementById('btn-save').innerText = "SIMPAN PERUBAHAN";
            document.getElementById('btn-save').style.background = "#f39c12";
        }

        function hapusItem(index) {
            if(confirm("Hapus?")) {
                dataPengumuman.splice(index, 1);
                localStorage.setItem('ledData', JSON.stringify(dataPengumuman));
                renderAll();
            }
        }

        function animate() {
            position -= 2; 
            if (position < -listWrapper.offsetHeight) position = window.innerHeight;
            listWrapper.style.top = position + 'px';
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') document.getElementById('admin-panel').classList.toggle('hidden');
        });

        // Inisialisasi Slider & Font
        document.getElementById('fontSlider').value = savedFontSize;
        document.getElementById('font-val').innerText = savedFontSize;

        renderAll();
        animate();
    </script>
</body>
</html>
