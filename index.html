<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display - Stable Version</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin */
        #admin-panel {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none; }

        /* Tabel Input agar Sejajar */
        .input-table { width: 100%; margin-bottom: 15px; border-collapse: collapse; }
        .input-table td { padding: 8px 5px; font-family: sans-serif; font-weight: bold; vertical-align: top; }
        
        textarea { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; min-height: 100px; font-family: sans-serif; }
        input[type="date"] { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }

        .slider-box { background: #f0f2f5; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-family: sans-serif; }

        /* List Kelola */
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f1f1f1; padding: 10px; margin-bottom: 8px;
            border-radius: 6px; font-family: sans-serif; font-size: 14px;
        }

        /* Area LED */
        .display-area { width: 100%; height: 100vh; position: relative; }
        #list-wrapper { position: absolute; width: 100%; margin: 0; padding: 0 50px; list-style: none; top: 100%; }
        .announcement-item { padding: 50px 0; border-bottom: 2px solid #222; display: flex; flex-direction: column; gap: 15px; }
        
        /* Warna Bergantian */
        .announcement-item:nth-child(odd) .text-content { color: #ffcc00; } 
        .announcement-item:nth-child(even) .text-content { color: #00e5ff; } 

        .date-badge { background: #ff4757; color: white; padding: 5px 25px; font-size: 2rem; width: fit-content; border-radius: 8px; }
        .text-content { line-height: 1.1; text-transform: uppercase; text-shadow: 4px 4px 0px #000; white-space: pre-line; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 20px 0; font-family: sans-serif;">Control Panel LED</h2>
        
        <div class="slider-box">
            <label>Ukuran Huruf: <span id="font-val">5</span>rem</label>
            <input type="range" min="1" max="15" step="0.5" value="5" style="width:100%" id="fontSlider" oninput="ubahFont(this.value)">
        </div>

        <input type="hidden" id="edit-index" value="-1">
        
        <table class="input-table">
            <tr>
                <td width="130">PENGUMUMAN</td>
                <td width="20">:</td>
                <td><textarea id="judul" placeholder="Ketik pesan..."></textarea></td>
            </tr>
            <tr>
                <td>TANGGAL</td>
                <td>:</td>
                <td><input type="date" id="tanggal"></td>
            </tr>
        </table>
        
        <button id="btn-save" onclick="simpanPengumuman()" style="padding:15px; background:#27ae60; color:white; border:none; width:100%; font-weight:bold; font-size:18px; cursor:pointer; border-radius: 8px;">SIMPAN PENGUMUMAN</button>
        
        <div style="margin-top:25px;">
            <strong style="font-family: sans-serif;">Daftar Pesan Aktif:</strong>
            <div id="admin-manage-list" style="margin-top:10px;"></div>
        </div>
        <p style="color:#aaa; font-size:11px; text-align:center; margin-top:20px;">Tekan <b>"H"</b> untuk Sembunyi/Muncul.</p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper"></ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let adminManageList = document.getElementById('admin-manage-list');
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let savedFS = localStorage.getItem('ledFontSize') || "5";
        let position = window.innerHeight;

        function ubahFont(val) {
            document.getElementById('font-val').innerText = val;
            localStorage.setItem('ledFontSize', val);
            renderAll();
        }

        function renderAll() {
            listWrapper.innerHTML = '';
            adminManageList.innerHTML = '';
            let currentFS = localStorage.getItem('ledFontSize') || "5";

            dataPengumuman.forEach((item, index) => {
                // Tampilan LED
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `<div class="date-badge">${item.tglDisplay}</div><div class="text-content" style="font-size:${currentFS}rem">${item.teks}</div>`;
                listWrapper.appendChild(li);

                // Tampilan Daftar Admin
                let div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <span style="max-width:280px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${item.teks}</span>
                    <div>
                        <button onclick="isiFormEdit(${index})" style="background:#f39c12; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">Edit</button>
                        <button onclick="hapusItem(${index})" style="background:#e74c3c; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px; margin-left:5px;">Hapus</button>
                    </div>
                `;
                adminManageList.appendChild(div);
            });
        }

        function simpanPengumuman() {
            let judul = document.getElementById('judul').value;
            let tanggal = document.getElementById('tanggal').value;
            let editIndex = document.getElementById('edit-index').value;

            if (!judul || !tanggal) return alert("Isi pesan dan tanggal!");

            let d = new Date(tanggal);
            let tglDisplay = d.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' });

            if (editIndex === "-1") {
                dataPengumuman.push({ teks: judul, tglRaw: tanggal, tglDisplay: tglDisplay });
            } else {
                dataPengumuman[editIndex] = { teks: judul, tglRaw: tanggal, tglDisplay: tglDisplay };
                document.getElementById('edit-index').value = "-1";
                document.getElementById('btn-save').innerText = "SIMPAN PENGUMUMAN";
                document.getElementById('btn-save').style.background = "#27ae60";
            }

            localStorage.setItem('ledData', JSON.stringify(dataPengumuman));
            document.getElementById('judul').value = '';
            document.getElementById('tanggal').value = '';
            renderAll();
        }

        function isiFormEdit(index) {
            let item = dataPengumuman[index];
            document.getElementById('judul').value = item.teks;
            document.getElementById('tanggal').value = item.tglRaw;
            document.getElementById('edit-index').value = index;
            document.getElementById('btn-save').innerText = "UPDATE PESAN";
            document.getElementById('btn-save').style.background = "#f39c12";
        }

        function hapusItem(index) {
            if(confirm("Hapus pesan ini?")) {
                dataPengumuman.splice(index, 1);
                localStorage.setItem('ledData', JSON.stringify(dataPengumuman));
                renderAll();
            }
        }

        function animate() {
            position -= 1.5; 
            if (position < -listWrapper.offsetHeight) position = window.innerHeight;
            listWrapper.style.top = position + 'px';
            requestAnimationFrame(animate);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'h') document.getElementById('admin-panel').classList.toggle('hidden');
        });

        document.getElementById('fontSlider').value = savedFS;
        document.getElementById('font-val').innerText = savedFS;
        renderAll();
        animate();
    </script>
</body>
</html>
