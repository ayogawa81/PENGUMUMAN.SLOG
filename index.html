<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega LED Display Pro</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: 'Arial Black', sans-serif;
        }

        /* Panel Admin Lebih Besar */
        #admin-panel {
            position: fixed; top: 20px; left: 20px; z-index: 9999;
            background: white; padding: 25px; border-radius: 12px;
            box-shadow: 0 0 40px rgba(255,255,255,0.3);
            width: 500px; max-height: 90vh; overflow-y: auto;
        }
        .hidden { display: none; }

        /* Tabel agar Input Rapi */
        .input-table { width: 100%; margin-bottom: 15px; }
        .input-table td { padding: 8px 0; font-family: sans-serif; font-weight: bold; }
        .input-table input { width: 100%; padding: 12px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; }

        /* Style List Kelola */
        .admin-item { 
            display: flex; justify-content: space-between; align-items: center;
            background: #f1f1f1; padding: 10px; margin-bottom: 8px;
            border-radius: 6px; font-family: sans-serif; font-size: 14px;
        }
        .btn-edit { background: #f39c12; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; margin-right: 5px; }
        .btn-del { background: #e74c3c; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; }

        /* Tampilan Utama LED */
        .display-area { width: 100%; height: 100vh; position: relative; padding: 0 5%; }
        #list-wrapper { position: absolute; width: 90%; margin: 0; padding: 0; list-style: none; top: 100%; }
        
        .announcement-item { padding: 50px 0; border-bottom: 2px solid #222; display: flex; flex-direction: column; gap: 15px; }
        
        /* Pewarnaan Berbeda Antar Pengumuman */
        .announcement-item:nth-child(odd) .text-content { color: #ffcc00; } /* Kuning */
        .announcement-item:nth-child(even) .text-content { color: #00e5ff; } /* Cyan / Biru Muda */

        .date-badge { background: #ff4757; color: white; padding: 5px 25px; font-size: 2rem; width: fit-content; border-radius: 8px; }
        .text-content { font-size: 5rem; line-height: 1.1; text-transform: uppercase; text-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <h2 style="margin:0 0 20px 0; border-bottom: 2px solid #333; padding-bottom: 10px;">Control Panel LED</h2>
        
        <input type="hidden" id="edit-index" value="-1">
        
        <table class="input-table">
            <tr>
                <td width="120">PENGUMUMAN</td>
                <td width="20">:</td>
                <td><input type="text" id="judul" placeholder="Ketik pesan di sini..."></td>
            </tr>
            <tr>
                <td>TANGGAL</td>
                <td>:</td>
                <td><input type="date" id="tanggal"></td>
            </tr>
        </table>
        
        <button id="btn-save" onclick="simpanPengumuman()" style="padding:15px; background:#27ae60; color:white; border:none; width:100%; font-weight:bold; font-size:18px; cursor:pointer; border-radius: 8px;">TAMBAH PENGUMUMAN</button>
        
        <div style="margin-top:25px;">
            <strong style="font-family: sans-serif;">Daftar Pesan Aktif:</strong>
            <div id="admin-manage-list" style="margin-top:10px;"></div>
        </div>

        <p style="color:#888; font-size:12px; margin-top:20px; text-align:center;">Tekan <b>"H"</b> untuk Sembunyi/Muncul.</p>
    </div>

    <div class="display-area">
        <ul id="list-wrapper"></ul>
    </div>

    <script>
        let listWrapper = document.getElementById('list-wrapper');
        let adminManageList = document.getElementById('admin-manage-list');
        let dataPengumuman = JSON.parse(localStorage.getItem('ledData')) || [];
        let position = window.innerHeight;

        function renderAll() {
            listWrapper.innerHTML = '';
            adminManageList.innerHTML = '';

            if (dataPengumuman.length === 0) {
                listWrapper.innerHTML = `<li class="announcement-item"><div class="text-content">STANDBY - BELUM ADA DATA</div></li>`;
            }

            dataPengumuman.forEach((item, index) => {
                // LED Area
                let li = document.createElement('li');
                li.className = 'announcement-item';
                li.innerHTML = `<div class="date-badge">${item.tglDisplay}</div><div class="text-content">${item.teks}</div>`;
                listWrapper.appendChild(li);

                // Admin Area
                let div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `
                    <span style="font-weight:bold; white
